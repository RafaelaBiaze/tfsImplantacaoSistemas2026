upstream backend_api {
    least_conn; # Algoritmo de menor número de conexões
    server backend1:5000 max_fails=3 fail_timeout=30s;
    server backend2:5000 max_fails=3 fail_timeout=30s;
    server backend3:5000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;
    
    # Redirecionamento para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Frontend (Site TechNova do TF01)
    location / {
        proxy_pass http://frontend:80;
    }

    # API com Rate Limiting e Proxy Headers
    location /api/ {
        limit_req zone=api_limit burst=5;
        proxy_pass http://backend_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
    }

    # Painel Admin
    location /admin/ {
        proxy_pass http://admin:80/;
    }

    # Monitoramento Nginx Status
    location /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.16.0.0/12; # Permite rede Docker
    }
}