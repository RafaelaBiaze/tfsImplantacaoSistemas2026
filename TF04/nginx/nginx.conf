events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    
    # Formato de log estruturado para monitoramento
    log_format upstream_logging '[$time_local] $remote_addr to: $upstream_addr: '
                                '$request upstream_response_time $upstream_response_time '
                                'msec $msec request_time $request_time';

    access_log /var/log/nginx/access.log upstream_logging;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate Limiting: 10 requisições por segundo por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    include /etc/nginx/conf.d/*.conf;
}