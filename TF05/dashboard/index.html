<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Monitoramento - TechNova</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Dashboard de Monitoramento</h1>
            <div class="status-overview">
                <div class="status-card healthy" id="overall-status">
                    <h3>Status Geral</h3>
                    <span class="status-indicator">●</span>
                    <span class="status-text">Saudável</span>
                </div>
            </div>
        </header>

        <main>
            <section class="services-grid">
                <div class="service-card" id="frontend-status">
                    <h3>Frontend</h3>
                    <div class="metrics">
                        <span class="metric"><label>Uptime:</label> <span id="frontend-uptime">99.9%</span></span>
                        <span class="metric"><label>Response Time:</label> <span id="frontend-response">0ms</span></span>
                    </div>
                    <div class="status-indicator healthy">●</div>
                </div>

                <div class="service-card" id="backend-status">
                    <h3>Backend API</h3>
                    <div class="metrics">
                        <span class="metric"><label>Uptime:</label> <span id="backend-uptime">99.8%</span></span>
                        <span class="metric"><label>Response Time:</label> <span id="backend-response">0ms</span></span>
                    </div>
                    <div class="status-indicator healthy">●</div>
                </div>
            </section>

            <section class="charts-section">
                <div class="chart-container">
                    <h3>Response Time (últimas 24h)</h3>
                    <canvas id="responseTimeChart"></canvas>
                </div>
            </section>
        </main>
    </div>
    <script src="js/dashboard.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
