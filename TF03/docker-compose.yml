version: '3.8'

services:

  nginx-proxy:
    image: nginx:alpine
    container_name: blog-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - blog-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: blog-frontend
    expose:
      - "3000"
    networks:
      - blog-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: blog-backend
    expose:
      - "5000"
    environment:
      DB_HOST: database
      DB_USER: bloguser
      DB_PASSWORD: blogpass
      DB_NAME: blogdb
    depends_on:
      - database
    networks:
      - blog-network
    restart: unless-stopped

  database:
    image: mysql:8.0
    container_name: blog-database
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: blogdb
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: blogpass
    volumes:
      - blog-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - blog-network
    restart: unless-stopped

networks:
  blog-network:
    driver: bridge

volumes:
  blog-data:
  nginx-logs: